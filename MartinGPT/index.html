<!DOCTYPE html>
<html>
<head>
  <link rel="shortcut icon" href="logo.png" type="image/x-icon">
  <link rel="icon" href="logo.png" type="image/x-icon">
  <title>Bienvenid@</title>
  <style>
    @font-face {
      font-family: "monocraft";
      src: url("Monocraft.otf") format("opentype");
    }

    body {
      font-family: "monocraft", sans-serif;
      background-image: url("fondo.jpg");
      background-size: cover;
      margin: 0;
    }
    
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding-top: 60px;
    }

    .barra-superior {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }

    .barra-superior a {
      color: white;
      text-decoration: none;
      margin-right: 10px;
      font-size: 20px;
      letter-spacing: 2px;
      padding: 0 5px;
      border-right: 1px solid white;
    }

    .barra-superior a:last-child {
      border-right: none;
    }

    h1 {
      color: white;
      text-align: center;
    }

    h2 {
      color: white;
      text-align: center;
    }

    p {
      max-width: 800px;
      margin: auto;
      margin-top: 20px;
      margin-bottom: 20px;
      color: white;
      text-align: center;
    }

    .video-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>

<body>
  <div class="container">

    <p>
    </p>
  </div>
